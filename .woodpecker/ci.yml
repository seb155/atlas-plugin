# ATLAS Plugin v5.0 — 3-Tier CI Pipeline (Woodpecker)
# L1 structural: immediate, no deps, <25s
# Build v5: core + addons
# L2 build-verify: after build, version + artifact integrity
# L3 integration: main only, non-blocking
# NOTE: Use $$ for shell variables (WP eats single $)

when:
  branch: [main, "feature/*", "hotfix/*"]
  event: [push, pull_request]

steps:
  # ═══════════════════════════════════════════════════════════════
  # L1 STRUCTURAL — fast gate, <25s, ~2,700 tests
  # ═══════════════════════════════════════════════════════════════

  l1-structural:
    image: python:3.13-slim
    commands:
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "not build and not integration and not broken" -x -q --tb=short

  # ═══════════════════════════════════════════════════════════════
  # BUILD v5 — core + addons (replaces old tier build)
  # ═══════════════════════════════════════════════════════════════

  build-v5:
    image: python:3.13-slim
    commands:
      - apt-get update -qq && apt-get install -y -qq bash yq > /dev/null 2>&1 || true
      - pip install pyyaml -q
      - ./build.sh v5
      - |
        for plugin in atlas-core atlas-dev-addon atlas-admin-addon; do
          if [ ! -f "dist/$${plugin}/.claude-plugin/plugin.json" ]; then
            echo "Missing dist/$${plugin}" && exit 1
          fi
        done
      # Sync legacy dist versions (if any remain)
      - |
        python3 -c "
        import json, glob
        v = open('VERSION').read().strip()
        for f in glob.glob('dist/*/.claude-plugin/plugin.json'):
            with open(f) as fh: d = json.load(fh)
            if d.get('version') != v:
                d['version'] = v
                with open(f, 'w') as fh: json.dump(d, fh, indent=2); fh.write('\n')
        "

  # ═══════════════════════════════════════════════════════════════
  # L2 BUILD VERIFICATION — dist/ integrity + version sync
  # ═══════════════════════════════════════════════════════════════

  l2-build-verify:
    image: python:3.13-slim
    commands:
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "build" -x -q --tb=short
    depends_on: [build-v5]

  # ═══════════════════════════════════════════════════════════════
  # L3 INTEGRATION — main only, non-blocking
  # ═══════════════════════════════════════════════════════════════

  l3-integration:
    image: python:3.13-slim
    when:
      branch: main
    commands:
      - apt-get update -qq && apt-get install -y -qq jq > /dev/null 2>&1 || true
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "integration" -q --tb=short || echo "L3 warnings (non-blocking)"
    depends_on: [build-v5]
    failure: ignore
