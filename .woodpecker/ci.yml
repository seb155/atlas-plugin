# ATLAS Plugin — 3-Tier CI Pipeline (Woodpecker)
# L1 structural runs IMMEDIATELY (no deps, <25s, ~2,900 tests)
# L2 build-verify runs AFTER build (dist/ integrity, ~100 tests)
# L3 integration runs on main only (non-blocking, hook execution)
# NOTE: Use $$ for shell variables (WP eats single $)

when:
  branch: [main, "feature/*", "hotfix/*"]
  event: [push, pull_request]

steps:
  # ═══════════════════════════════════════════════════════════════
  # L1 STRUCTURAL — fast gate, no deps, catches 90% of regressions
  # Runs IMMEDIATELY in parallel with build — ~20-25s
  # ═══════════════════════════════════════════════════════════════

  l1-structural:
    image: python:3.13-slim
    commands:
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "not build and not integration and not broken" -x -q --tb=short

  # ═══════════════════════════════════════════════════════════════
  # BUILD — produce dist/ artifacts for L2 + release
  # ═══════════════════════════════════════════════════════════════

  build-tiers:
    image: python:3.13-slim
    commands:
      - apt-get update -qq && apt-get install -y -qq bash yq > /dev/null 2>&1 || true
      - pip install pyyaml -q
      - ./build.sh all
      - |
        for tier in admin dev user; do
          if [ ! -f "dist/atlas-$${tier}/.claude-plugin/plugin.json" ]; then
            echo "Missing dist/atlas-$${tier}" && exit 1
          fi
        done

  build-domains:
    image: python:3.13-slim
    commands:
      - apt-get update -qq && apt-get install -y -qq bash yq > /dev/null 2>&1 || true
      - pip install pyyaml -q
      - ./build.sh domains
    depends_on: [build-tiers]

  # ═══════════════════════════════════════════════════════════════
  # L2 BUILD VERIFICATION — dist/ artifact integrity + version sync
  # ═══════════════════════════════════════════════════════════════

  l2-build-verify:
    image: python:3.13-slim
    commands:
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "build" -x -q --tb=short
    depends_on: [build-domains]

  # ═══════════════════════════════════════════════════════════════
  # L3 INTEGRATION — main only, non-blocking, hook execution
  # ═══════════════════════════════════════════════════════════════

  l3-integration:
    image: python:3.13-slim
    when:
      branch: main
    commands:
      - apt-get update -qq && apt-get install -y -qq jq > /dev/null 2>&1 || true
      - pip install pytest pyyaml -q
      - python3 -m pytest tests/ -m "integration" -q --tb=short || echo "L3 warnings (non-blocking)"
    depends_on: [build-domains]
    failure: ignore
