# ATLAS Plugin — Security Scanning (Woodpecker)
# Gitleaks secret scan on push to main

when:
  branch: [main]
  event: push

steps:
  secret-scan:
    image: zricethezav/gitleaks:8.21
    commands:
      # Hard-fail since v5.7.0-alpha.1 (Phase 6F).
      # If a false positive appears, add to .gitleaks.toml allowlist — do NOT revert to failure:ignore.
      - gitleaks detect --source . --no-git --verbose
