# Execution Manifest Schema v1.0
# Intermediate artifact between plan-builder and executing-plans.
# Generated by execution-strategy skill, consumed by executing-plans skill.
# Stored at: .claude/execution-manifest.json
#
# Flow: plan-builder → execution-strategy → executing-plans
#       (WHAT)          (HOW)                (DO)

manifest_version: "1.0"

# --- Plan Reference ---
plan:
  path: ""           # e.g. .blueprint/plans/sp16-test-coverage-60.md
  name: ""           # e.g. SP-16 Test Coverage
  total_effort_h: 0  # sum of all task hours
  total_phases: 0
  total_tasks: 0

# --- Runtime Environment ---
environment:
  hostname: ""               # sgagnon (laptop) | ATL-dev (VM 560)
  tmux_available: false      # true if $TMUX is set
  current_model: "opus-1m"   # opus-1m | sonnet | haiku
  effort_level: "max"        # low | medium | high | max
  agent_teams_enabled: false # true if $CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS
  max_parallel_agents: 4     # capped at 4 for stability

# --- Strategy Summary ---
strategy:
  mode: "solo"  # solo | subagent | team | hybrid
  parallel_groups:
    - group_id: "G1"
      tasks: []         # e.g. ["P2.1", "P2.2", "P2.3"]
      reason: ""        # why these can run in parallel
  critical_path: []     # ordered task IDs on the longest path
  critical_path_hours: 0
  total_hours_sequential: 0
  total_hours_parallel: 0
  speedup_pct: 0        # (sequential - parallel) / sequential * 100

# --- Task Definitions ---
# One entry per task extracted from plan Section N
tasks:
  - id: "P1.1"           # Convention: P{phase}.{task}
    name: ""              # Short descriptive name
    phase: "P1"           # Phase identifier
    type: "implementation" # db_migration | architecture | implementation | testing | review | lint | search | validation
    model: "sonnet"       # opus | sonnet | haiku
    mode: "solo"          # solo | subagent | team | det
    effort: "high"        # low | medium | high | max (maps to CC --effort flag)
    files: []             # file paths this task touches
    estimated_tokens: 0   # input + output tokens combined
    estimated_cost_usd: 0.00
    estimated_hours: 0
    depends_on: []        # task IDs that must complete first (DAG edges)
    blocks: []            # task IDs blocked by this task
    parallel_group: null  # group ID if part of a parallel group
    rationale: ""         # why this model/mode was chosen

# --- Cost Summary ---
cost_summary:
  by_model:
    opus:
      tasks: 0
      tokens: 0
      cost_usd: 0.00
    sonnet:
      tasks: 0
      tokens: 0
      cost_usd: 0.00
    haiku:
      tasks: 0
      tokens: 0
      cost_usd: 0.00
    det:
      tasks: 0
      tokens: 0
      cost_usd: 0.00
  total_tokens: 0
  total_cost_usd: 0.00
  vs_all_opus_cost_usd: 0.00  # what it would cost if ALL tasks used Opus
  savings_pct: 0               # (vs_all_opus - total) / vs_all_opus * 100

# --- HITL Gates ---
# Points where execution pauses for human review
hitl_gates:
  - after_task: ""    # task ID (mutually exclusive with after_group)
    after_group: null  # group ID
    reason: ""         # why human review is needed here

# --- Metadata ---
overrides_applied: []  # list of override flags used (e.g. --force-opus, --budget $10)
generated_at: ""       # ISO 8601 timestamp

# --- Pricing Reference (2026-04 rates) ---
# Not part of the manifest output, but used during generation.
# See also: model-rules.yaml for allocation logic.
pricing_reference:
  opus:
    input_per_mtoken: 15.00
    output_per_mtoken: 75.00
    cache_write_per_mtoken: 18.75
    cache_read_per_mtoken: 1.50
  sonnet:
    input_per_mtoken: 3.00
    output_per_mtoken: 15.00
    cache_write_per_mtoken: 3.75
    cache_read_per_mtoken: 0.30
  haiku:
    input_per_mtoken: 0.25
    output_per_mtoken: 1.25
    cache_write_per_mtoken: 0.30
    cache_read_per_mtoken: 0.03

# --- Token Estimation Heuristics ---
# 1h of work ≈ 50K input tokens + 15K output tokens (baseline)
# Adjusted by task_complexity_factor and output_ratio (see model-rules.yaml)
token_estimation:
  baseline_input_per_hour: 50000
  baseline_output_per_hour: 15000
