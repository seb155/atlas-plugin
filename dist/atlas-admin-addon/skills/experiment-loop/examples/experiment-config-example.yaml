# Experiment Configuration — Example
# This file defines an optimization experiment for the experiment-loop skill.

experiment:
  name: "optimize-search-response-time"
  hypothesis: "Reducing BM25 result limit from 100 to 25 will improve P95 response time by >30%"

  # What to measure
  metric:
    name: "p95_response_time_ms"
    baseline: 450  # current P95 in ms
    target: 315    # 30% improvement target
    direction: minimize

  # Where to mutate
  target_file: "backend/app/services/search_service.py"
  target_variable: "BM25_RESULT_LIMIT"

  # Mutation strategy
  mutations:
    type: "parameter_sweep"
    values: [100, 75, 50, 25, 10]

  # How to test
  test_command: |
    docker exec synapse-backend bash -c "
      cd /app && python -m pytest tests/performance/test_search_perf.py \
        -x -q --tb=short -k 'test_p95_response_time'
    "

  # Safety
  max_iterations: 5
  max_consecutive_failures: 2
  rollback_on_failure: true

  # HITL gates
  require_approval_for:
    - "regression > 20%"
    - "metric not measurable"
    - "test infrastructure failure"

