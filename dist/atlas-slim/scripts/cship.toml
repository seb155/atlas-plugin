# CShip + ATLAS Plugin — Layout v5 (SOTA CC 2.1.85 / Opus 4.6 1M)
# Row 1: 🏛️ version 👑tier  🟣 model (CTX)  📁 dir  🌿 git  🌳 worktree  📋 session
# Row 2: context bar  📈 lines  ⏱ rate limits
# Row 3: ⚠️ alert (conditional: context >75%)

[cship]
lines = [
  "🏛️ ATLAS $custom.atlas_version 👑$custom.atlas_tier  $cship.model ($custom.atlas_context_size)  $directory  $git_branch $git_status  $cship.worktree  $cship.session",
  "$cship.context_bar  📈 $cship.cost.total_lines_added $cship.cost.total_lines_removed  $cship.usage_limits",
  "$custom.atlas_alert"
]

[cship.model]
symbol = "🟣 "
style = "bold"

[cship.context_bar]
width = 20
style = "green"
warn_threshold = 50
warn_style = "yellow"
critical_threshold = 75
critical_style = "bold red"

[cship.cost.total_lines_added]
symbol = "+"
style = "green"

[cship.cost.total_lines_removed]
symbol = "-"
style = "red"

[cship.worktree]
symbol = "🌳 "
style = "bold green"

[cship.session]
symbol = "📋 "
style = "bold blue"

[cship.usage_limits]
style = "dim"

# ─── Custom Modules (resolved via shell scripts) ─────────────
[custom.atlas_context_size]
command = "~/.local/share/atlas-statusline/atlas-context-size-module.sh"
style = "bold cyan"

[custom.atlas_version]
command = "~/.local/share/atlas-statusline/atlas-resolve-version.sh"
style = "bold cyan"

[custom.atlas_tier]
command = "jq -r '.tier // \"?\"' ${CLAUDE_PLUGIN_DATA:-$HOME/.claude}/session-state.json 2>/dev/null || echo '?'"
style = "bold yellow"

[custom.atlas_alert]
command = "~/.local/share/atlas-statusline/atlas-alert-module.sh"
style = "bold red"
