[pytest]
testpaths = tests
addopts = -q
markers =
    build: L2 — require dist/ artifacts from build step
    integration: L3 — require subprocess hook execution (bash, jq)
    broken: Excluded from CI — known failures tracked for fix
    hook: Tests that execute hook scripts via subprocess
    e2e: End-to-end plugin tests (require built dist/ artifacts)
    strict: Strict validation (cross-refs, template vars, quality gates)
    smoke: Minimal essential tests
    skill: Skill-specific dependency tests
