# Skill Dependency Graph — declares which skills depend on which others.
# Used by test_skill_dependencies.py for tier validation.
# Format: skill_name → list of required skills
#
# If a skill depends on another, both must be available in the same tier
# (or the dependency must be in a parent tier that gets inherited).

