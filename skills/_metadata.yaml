# ATLAS Skills Metadata — Single Source of Truth
# Used by: build.sh (tier+domain builds), scripts/generate-master-skill.sh (atlas-assist generation)
#
# owner: which TIER plugin OWNS this skill (where the SKILL.md lives in tier dist/)
#   core = base tier (everyone), dev = dev delta, admin = admin delta
#   infra/enterprise = domain-exclusive (not in any tier)
#
# domains: which DOMAIN plugins BUNDLE this skill (functional grouping)
#   A skill can be owned by 'admin' (tier) but bundled in 'infra' (domain)
#   Skills without domains are tier-exclusive (admin only, no domain bundle)
#
# SP-DEDUP Phase 2: Tier builds use 'owner', Domain builds use profile YAML directly.
#
# Updated: 2026-04-04

