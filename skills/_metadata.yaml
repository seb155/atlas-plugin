# ATLAS Skills Metadata — Single Source of Truth
# Used by: build.sh (tier+domain builds), scripts/generate-master-skill.sh (atlas-assist generation)
#
# owner: which TIER plugin OWNS this skill (where the SKILL.md lives in tier dist/)
#   core = base tier (everyone), dev = dev delta, admin = admin delta
#   infra/enterprise = domain-exclusive (not in any tier)
#
# domains: which DOMAIN plugins BUNDLE this skill (functional grouping)
#   A skill can be owned by 'admin' (tier) but bundled in 'infra' (domain)
#   Skills without domains are tier-exclusive (admin only, no domain bundle)
#
# SP-DEDUP Phase 2: Tier builds use 'owner', Domain builds use profile YAML directly.
#
# Optional fields (SOTA upgrade 2026-04-11):
#   inputs: typed data the skill expects (e.g. ["plan_path: string", "overrides?: object"])
#   outputs: typed data the skill produces (e.g. ["manifest_path: string", "cost_estimate: number"])
#   depends_on: skills that must exist for this skill to work (e.g. [decision-log])
#   triggers: keywords/phrases that should auto-suggest this skill (e.g. ["deploy", "ship to prod"])
#   weight: 1-10, how prominent the skill is in atlas-assist (default 5)
#           weight >= 8: description shown inline in atlas-assist listing
#           weight < 8: name+emoji only (description loads on demand via Skill tool)
#
# Updated: 2026-04-11

# Category header emojis (for grouped skill lists)
