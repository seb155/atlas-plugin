name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build all tiers
    runs-on: ci-atlas
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Verify outputs
        shell: sh
        run: |
          for tier in admin dev user; do
            out="dist/atlas-${tier}"
            echo "Checking ${out}..."
            test -d "${out}" || { echo "MISSING: ${out}"; exit 1; }
            test -f "${out}/.claude-plugin/plugin.json" || { echo "MISSING plugin.json"; exit 1; }
            test -f "${out}/hooks/hooks.json" || { echo "MISSING hooks.json"; exit 1; }
            skill_count=$(find ${out}/skills -name 'SKILL.md' | wc -l)
            cmd_count=$(find ${out}/commands -name '*.md' | wc -l)
            echo "  OK — ${skill_count} skills, ${cmd_count} commands"
          done

  test:
    name: Validate plugin structure
    runs-on: ci-atlas
    needs: build
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Build for tests
        shell: sh
        run: ./build.sh all

      - name: Run core tests
        shell: sh
        run: |
          python3 -m pytest tests/ -x -q --tb=short -m "not strict"

      - name: Run strict tests (advisory)
        shell: sh
        continue-on-error: true
        run: |
          python3 -m pytest tests/ -q --tb=short -m "strict" || echo "::warning::Strict tests have failures — review recommended"

      - name: E2E hook smoke tests
        shell: sh
        run: |
          echo '{}' | CLAUDE_PLUGIN_ROOT=. hooks/session-start | tail -1 | python3 -c "
          import sys,json; d=json.load(sys.stdin); assert d['continue'] == True; print('session-start: OK')
          "
          echo '{"file_path":"/dev/null"}' | hooks/enterprise-check && echo "enterprise-check: OK"
          echo '{}' | CLAUDE_PLUGIN_ROOT=. hooks/post-compact | grep -q "ATLAS" && echo "post-compact: OK"
          scripts/detect-platform.sh | python3 -c "import sys,json; json.load(sys.stdin); print('detect-platform: OK')"
          echo "All E2E smoke tests passed"

      - name: Regression gate (dynamic — no hardcoded thresholds)
        shell: sh
        run: |
          SKILLS=$(find dist/atlas-admin/skills -name 'SKILL.md' | wc -l)
          CMDS=$(find dist/atlas-admin/commands -name '*.md' | wc -l)
          AGENTS=$(find dist/atlas-admin/agents -name 'AGENT.md' 2>/dev/null | wc -l)
          echo "Current build: Skills=${SKILLS} | Commands=${CMDS} | Agents=${AGENTS}"

          # Sanity check: must have at least 1 of each
          test ${SKILLS} -gt 0 || { echo "REGRESSION: zero skills"; exit 1; }
          test ${CMDS} -gt 0 || { echo "REGRESSION: zero commands"; exit 1; }

          # Structural checks (more valuable than count gates)
          test -f dist/atlas-admin/.claude-plugin/plugin.json || { echo "MISSING: plugin.json"; exit 1; }
          test -f dist/atlas-admin/hooks/hooks.json || { echo "MISSING: hooks.json"; exit 1; }
          test -f dist/atlas-admin/skills/atlas-assist/SKILL.md || { echo "MISSING: atlas-assist skill"; exit 1; }

          echo "Regression gate passed (${SKILLS} skills, ${CMDS} commands, ${AGENTS} agents)"

      - name: Hook executability check
        shell: sh
        run: |
          echo "Checking hook scripts are executable..."
          FAIL=0
          for hook in hooks/*; do
            [ -f "$hook" ] || continue
            [ "$hook" = "hooks/hooks.json" ] && continue
            [ -d "$hook" ] && continue
            case "$hook" in *.py|*.md|*.json|*.toml) continue ;; esac
            if ! [ -x "$hook" ]; then
              echo "  NOT EXECUTABLE: $hook"
              FAIL=1
            fi
          done
          [ $FAIL -eq 0 ] && echo "All hook scripts are executable" || exit 1

      - name: Settings isolation check
        shell: sh
        run: |
          echo "Verifying plugin settings.json has no hooks block..."
          python3 -c "
          import json, sys
          s = json.load(open('settings.json'))
          if 'hooks' in s:
              print('FAIL: settings.json contains hooks block — use hooks/hooks.json')
              sys.exit(1)
          print('OK: settings.json clean (no hooks block)')
          "

      - name: Hook E2E smoke tests (SOTA hooks)
        shell: sh
        run: |
          echo "Testing protect-plugin-cache (should block)..."
          echo '{"tool_input":{"file_path":"'$HOME'/.claude/plugins/cache/test/file.md"}}' \
            | CLAUDE_PLUGIN_ROOT=. hooks/protect-plugin-cache 2>/dev/null && echo "FAIL: should have blocked" && exit 1 || true
          echo "  protect-plugin-cache: OK (exit 2 = blocked)"

          echo "Testing task-created-log..."
          TMPLOG=$(mktemp)
          echo '{"tool_input":{"subject":"CI test task"}}' \
            | HOME=$(dirname $TMPLOG) CLAUDE_PLUGIN_ROOT=. hooks/task-created-log
          echo "  task-created-log: OK (exit 0)"

          echo "Testing permission-denied-log..."
          echo '{"tool_name":"Bash","action":"deny"}' \
            | HOME=$(mktemp -d) CLAUDE_PLUGIN_ROOT=. hooks/permission-denied-log
          echo "  permission-denied-log: OK (exit 0)"

          echo "Testing cwd-changed-env..."
          CLAUDE_PLUGIN_ROOT=. hooks/cwd-changed-env
          echo "  cwd-changed-env: OK (exit 0)"

          echo "All SOTA hook smoke tests passed"

      - name: Shellcheck advisory
        shell: sh
        run: |
          if command -v shellcheck &>/dev/null; then
            echo "Running shellcheck on hook scripts..."
            WARNINGS=0
            for hook in hooks/*; do
              [ -f "$hook" ] || continue
              [ -d "$hook" ] && continue
              case "$hook" in *.json|*.py|*.md|*.toml) continue ;; esac
              head -1 "$hook" | grep -q "^#!" || continue
              if ! shellcheck -S warning "$hook" 2>/dev/null; then
                WARNINGS=$((WARNINGS + 1))
              fi
            done
            echo "Shellcheck done ($WARNINGS scripts with warnings — advisory only)"
          else
            echo "shellcheck not installed — skipping (advisory)"
          fi

      - name: Version sync check
        shell: sh
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Checking version sync (VERSION=$VERSION)..."

          # Check dist atlas-cli.sh has correct version
          for tier in admin dev user worker; do
            CLI="dist/atlas-${tier}/scripts/atlas-cli.sh"
            if [ -f "$CLI" ]; then
              CLI_VER=$(grep '^ATLAS_VERSION=' "$CLI" | cut -d'"' -f2)
              if [ "$CLI_VER" != "$VERSION" ]; then
                echo "FAIL: $CLI has version $CLI_VER, expected $VERSION"
                exit 1
              fi
              echo "  atlas-${tier}/atlas-cli.sh: v${CLI_VER} ✓"
            fi
          done

          # Check plugin.json versions match
          for tier in admin dev user worker; do
            PJ="dist/atlas-${tier}/.claude-plugin/plugin.json"
            if [ -f "$PJ" ]; then
              PJ_VER=$(python3 -c "import json; print(json.load(open('$PJ'))['version'])")
              if [ "$PJ_VER" != "$VERSION" ]; then
                echo "FAIL: $PJ has version $PJ_VER, expected $VERSION"
                exit 1
              fi
            fi
          done

          echo "Version sync OK ($VERSION everywhere)"

      - name: Verify version sync across all tiers
        shell: sh
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          FAILED=0
          for tier in admin dev user core infra enterprise frontend experiential worker; do
            TIER_DIR="dist/atlas-${tier}"
            [ -d "$TIER_DIR" ] || continue
            PJ="${TIER_DIR}/.claude-plugin/plugin.json"
            [ -f "$PJ" ] || continue
            TIER_VER=$(python3 -c "import json; print(json.load(open('$PJ'))['version'])")
            if [ "$TIER_VER" != "$VERSION" ]; then
              echo "::error::Version skew: atlas-${tier}=${TIER_VER} vs VERSION=${VERSION}"
              FAILED=1
            else
              echo "  atlas-${tier}: v${TIER_VER} ✓"
            fi
          done
          [ $FAILED -eq 0 ] || exit 1
          echo "✅ All tiers at version $VERSION"

      - name: Portability check (SP-PORTABLE)
        shell: sh
        run: |
          echo "Checking for hardcoded paths and IPs..."
          FAIL=0

          # Check for /home/sgagnon (or any /home/user) in active code
          HITS=$(grep -rn "/home/sgagnon\|/home/seb" skills/ hooks/ agents/ \
            --include="*.sh" --include="*.ts" --include="*.md" \
            2>/dev/null | grep -v "node_modules\|__pycache__\|references/" | wc -l)
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Found $HITS hardcoded /home/ paths in active code"
            grep -rn "/home/sgagnon\|/home/seb" skills/ hooks/ agents/ \
              --include="*.sh" --include="*.ts" --include="*.md" \
              2>/dev/null | grep -v "node_modules\|__pycache__\|references/" | head -10
            FAIL=1
          fi

          # Check for hardcoded IPs in hooks (setup-wizard defaults are OK)
          HITS=$(grep -rn "192\.168\." hooks/ --include="*.sh" 2>/dev/null | wc -l)
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Found $HITS hardcoded IPs in hooks"
            grep -rn "192\.168\." hooks/ --include="*.sh" 2>/dev/null | head -5
            FAIL=1
          fi

          # Check for hardcoded python3 in hooks (should use $ATLAS_PYTHON)
          HITS=$(grep -rn "python3 " hooks/ --include="*.sh" 2>/dev/null \
            | grep -v "lib/python.sh" | wc -l)
          if [ "$HITS" -gt 0 ]; then
            echo "::error::Found $HITS hardcoded python3 in hooks (use \$ATLAS_PYTHON)"
            FAIL=1
          fi

          [ $FAIL -eq 0 ] && echo "Portability check passed" || exit 1

      - name: Zero-duplication gate (SP-DEDUP)
        shell: sh
        run: |
          echo "Checking skill duplication across all packages..."
          DUPES=$(for pkg in dist/atlas-*/; do
            if [ -d "${pkg}skills" ]; then
              find "${pkg}skills" -maxdepth 1 -mindepth 1 -type d \
                -not -name "refs" -not -name "atlas-assist" -exec basename {} \;
            fi
          done | sort | uniq -d)
          if [ -n "$DUPES" ]; then
            echo "FAIL: Skill duplication found:"
            echo "$DUPES"
            exit 1
          fi
          TOTAL=$(for pkg in dist/atlas-*/; do
            if [ -d "${pkg}skills" ]; then
              find "${pkg}skills" -maxdepth 1 -mindepth 1 -type d \
                -not -name "refs" -not -name "atlas-assist" -exec basename {} \;
            fi
          done | sort -u | wc -l)
          echo "Zero-duplication gate passed (${TOTAL} unique skills, 0 duplicates)"

  release:
    name: Auto-release (SemVer from commits)
    runs-on: ci-atlas
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout (full history)
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .
          git fetch --tags

      - name: Configure git
        shell: sh
        run: |
          git config user.name "ATLAS CI"
          git config user.email "atlas-ci@axoiq.com"

      - name: Auto-release
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_API_URL: http://${{ vars.FORGEJO_HOST }}/api/v1
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .forgejo/scripts/auto-release.sh
          .forgejo/scripts/auto-release.sh
