name: Auto-Release

# Automatically bump version + create tag on push to main
# Uses conventional commits to determine version bump:
#   feat(*) → minor (4.42.0 → 4.43.0)
#   fix(*)  → patch (4.42.0 → 4.42.1)
#   perf(*) → patch (4.42.0 → 4.42.1)
#   feat!(*) or BREAKING CHANGE → major (4.42.0 → 5.0.0)
#   chore/docs/build/ci/refactor/test/style → NO bump (skipped)

on:
  push:
    branches: [main]
    paths-ignore:
      # Only ignore root-level docs — SKILL.md in skills/ MUST trigger CI
      - "README.md"
      - "CHANGELOG.md"
      - "ONBOARDING.md"
      - "DEPLOYMENT.md"
      - "ARCHITECTURE.md"
      - "PARALLELISM.md"
      - "docs/**"
      - "evals/**"

jobs:
  auto-release:
    name: Auto-Release
    runs-on: ci-atlas
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=50 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .
          git fetch --tags
          git config user.name "atlas-ci"
          git config user.email "ci@axoiq.com"

      - name: Auto-release (SemVer from commits)
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_API_URL: https://${{ vars.FORGEJO_HOST }}/api/v1
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Set authenticated remote for push
          git remote set-url origin "http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git"

          # Single source of truth: auto-release.sh handles everything
          # - Detect commits since last tag
          # - Determine bump type (feat→minor, fix/perf→patch, breaking→major)
          # - Update VERSION + plugin.json + marketplace.json + CHANGELOG.md
          # - Commit + tag + push + create Forgejo Release
          ./.forgejo/scripts/auto-release.sh
