name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to Forgejo Package Registry
    runs-on: ci-atlas
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Package and publish tiers
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: ${{ github.server_url }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing version ${VERSION}"

          for tier in admin dev user; do
            pkg="atlas-${tier}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 3 tiers published for v${VERSION}"
