name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to Forgejo Package Registry
    runs-on: ci-atlas
    steps:
      - name: Checkout tag
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 --branch ${{ github.ref_name }} http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .
          git fetch --tags --depth=10

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Package and publish tiers
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: http://${{ vars.FORGEJO_HOST }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing version ${VERSION}"

          for tier in admin dev user; do
            pkg="atlas-${tier}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 3 tiers published for v${VERSION}"

      - name: Create Forgejo Release
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: http://${{ vars.FORGEJO_HOST }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')

          # Generate release notes from git log since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | head -20)
          else
            NOTES="Initial release"
          fi

          # Count skills/commands/agents from built dist
          SKILLS=$(find dist/atlas-admin/skills -name "SKILL.md" 2>/dev/null | wc -l)
          COMMANDS=$(find dist/atlas-admin/commands -name "*.md" 2>/dev/null | wc -l)

          BODY="## ATLAS v${VERSION}\n\n${SKILLS} skills | ${COMMANDS} commands\n\n### Changes\n${NOTES}"

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "${FORGEJO_URL}/api/v1/repos/${REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"v${VERSION}\",\"body\":\"${BODY}\",\"draft\":false,\"prerelease\":false}"

          echo "Release v${VERSION} created"
