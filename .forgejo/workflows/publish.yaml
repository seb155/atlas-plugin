name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish to Forgejo Package Registry
    runs-on: ci-atlas
    steps:
      - name: Checkout tag
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 --branch ${{ github.ref_name }} http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .
          git fetch --tags --depth=10

      - name: Build all tiers + domains
        shell: sh
        run: |
          ./build.sh all
          ./build.sh domains

      - name: Package and publish tiers (legacy)
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: http://${{ vars.FORGEJO_HOST }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing legacy tiers v${VERSION}"

          for tier in admin dev user; do
            pkg="atlas-${tier}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 3 legacy tiers published for v${VERSION}"

      - name: Package and publish domain plugins (SP-ECO v4)
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: http://${{ vars.FORGEJO_HOST }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing domain plugins v${VERSION}"

          for domain in core dev frontend infra enterprise experiential; do
            pkg="atlas-${domain}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 6 domain plugins published for v${VERSION}"

      - name: Create Forgejo Release
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: http://${{ vars.FORGEJO_HOST }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')

          # Generate release notes from git log since last tag
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD" | head -20)
          else
            NOTES="Initial release"
          fi

          # Count skills from built dist (legacy + domains)
          SKILLS=$(find dist/atlas-admin/skills -name "SKILL.md" 2>/dev/null | wc -l)
          DOMAINS_BUILT=$(ls -d dist/atlas-core dist/atlas-dev dist/atlas-frontend dist/atlas-infra dist/atlas-enterprise dist/atlas-experiential 2>/dev/null | wc -l)

          BODY="## ATLAS v${VERSION}\n\n${SKILLS} skills (monolith) | ${DOMAINS_BUILT} domain plugins\n\n### Changes\n${NOTES}"

          curl --fail-with-body --silent --show-error \
            -X POST \
            -H "Authorization: token ${FORGEJO_TOKEN}" \
            -H "Content-Type: application/json" \
            "${FORGEJO_URL}/api/v1/repos/${REPO}/releases" \
            -d "{\"tag_name\":\"${TAG}\",\"name\":\"v${VERSION}\",\"body\":\"${BODY}\",\"draft\":false,\"prerelease\":false}"

          echo "Release v${VERSION} created"

      - name: Mirror to GitHub
        shell: sh
        env:
          GITHUB_MIRROR_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
        run: |
          if [ -z "${GITHUB_MIRROR_TOKEN:-}" ]; then
            echo "⚠️ GITHUB_MIRROR_TOKEN not set — skipping GitHub mirror"
            exit 0
          fi
          echo "Mirroring to GitHub..."
          git remote add github "https://x-access-token:${GITHUB_MIRROR_TOKEN}@github.com/seb155/atlas-plugin.git" 2>/dev/null || true
          git push github HEAD:main --tags --force
          echo "✅ Mirrored to github.com/seb155/atlas-plugin"
