name: Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build all tiers
    runs-on: bun
    steps:
      - name: Checkout
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 http://oauth2:${GITHUB_TOKEN}@192.168.10.75:3000/${{ github.repository }}.git .

      - name: Install yq
        shell: sh
        run: |
          YQ_VERSION="v4.44.6"
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Verify outputs
        shell: sh
        run: |
          for tier in admin dev user; do
            out="dist/atlas-${tier}"
            echo "Checking ${out}..."
            test -d "${out}" || { echo "MISSING: ${out}"; exit 1; }
            test -f "${out}/.claude-plugin/plugin.json" || { echo "MISSING plugin.json"; exit 1; }
            test -f "${out}/hooks/hooks.json" || { echo "MISSING hooks.json"; exit 1; }
            skill_count=$(find ${out}/skills -name 'SKILL.md' | wc -l)
            cmd_count=$(find ${out}/commands -name '*.md' | wc -l)
            echo "  OK — ${skill_count} skills, ${cmd_count} commands"
          done

  test:
    name: Validate plugin structure
    runs-on: bun
    needs: build
    steps:
      - name: Checkout
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 http://oauth2:${GITHUB_TOKEN}@192.168.10.75:3000/${{ github.repository }}.git .

      - name: Install Python + test deps
        shell: sh
        run: |
          pip3 install --quiet pytest pyyaml 2>/dev/null || pip install --quiet pytest pyyaml

      - name: Install yq
        shell: sh
        run: |
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Run plugin tests
        shell: sh
        run: |
          cd tests && python3 -m pytest . -x -q --tb=short

  publish:
    name: Publish to Forgejo Package Registry
    runs-on: bun
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        shell: sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --depth=1 http://oauth2:${GITHUB_TOKEN}@192.168.10.75:3000/${{ github.repository }}.git .

      - name: Install yq
        shell: sh
        run: |
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Package and publish tiers
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: ${{ github.server_url }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing version ${VERSION}"

          for tier in admin dev user; do
            pkg="atlas-${tier}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 3 tiers published for v${VERSION}"
