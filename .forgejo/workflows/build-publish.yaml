name: Build & Publish

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build all tiers
    runs-on: bun
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Install yq
        shell: sh
        run: |
          YQ_VERSION="v4.44.6"
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          chmod +x /usr/local/bin/yq
          yq --version

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Verify outputs
        shell: sh
        run: |
          for tier in admin dev user; do
            out="dist/atlas-${tier}"
            echo "Checking ${out}..."
            test -d "${out}" || { echo "MISSING: ${out}"; exit 1; }
            test -f "${out}/.claude-plugin/plugin.json" || { echo "MISSING plugin.json"; exit 1; }
            test -f "${out}/hooks/hooks.json" || { echo "MISSING hooks.json"; exit 1; }
            skill_count=$(find ${out}/skills -name 'SKILL.md' | wc -l)
            cmd_count=$(find ${out}/commands -name '*.md' | wc -l)
            echo "  OK — ${skill_count} skills, ${cmd_count} commands"
          done

  test:
    name: Validate plugin structure
    runs-on: bun
    needs: build
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Install Python + test deps
        shell: sh
        run: |
          pip3 install --quiet --break-system-packages pytest pyyaml 2>/dev/null || pip3 install --quiet pytest pyyaml 2>/dev/null || pip install --quiet pytest pyyaml

      - name: Install yq
        shell: sh
        run: |
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Build for E2E tests
        shell: sh
        run: ./build.sh all

      - name: Run ALL tests (structural + E2E + regression)
        shell: sh
        run: |
          python3 -m pytest tests/ -x -q --tb=short --maxfail=3

      - name: E2E hook smoke tests
        shell: sh
        run: |
          echo '{}' | CLAUDE_PLUGIN_ROOT=. hooks/session-start | tail -1 | python3 -c "
          import sys,json; d=json.load(sys.stdin); assert d['continue'] == True; print('session-start: OK')
          "
          echo '{"file_path":"/dev/null"}' | hooks/enterprise-check && echo "enterprise-check: OK"
          echo '{}' | CLAUDE_PLUGIN_ROOT=. hooks/post-compact | grep -q "ATLAS" && echo "post-compact: OK"
          scripts/detect-platform.sh | python3 -c "import sys,json; json.load(sys.stdin); print('detect-platform: OK')"
          echo "All E2E smoke tests passed"

      - name: Regression gate
        shell: sh
        run: |
          SKILLS=$(find dist/atlas-admin/skills -name 'SKILL.md' | wc -l)
          CMDS=$(find dist/atlas-admin/commands -name '*.md' | wc -l)
          AGENTS=$(find dist/atlas-admin/agents -name 'AGENT.md' 2>/dev/null | wc -l)
          echo "Skills: ${SKILLS} | Commands: ${CMDS} | Agents: ${AGENTS}"
          test ${SKILLS} -ge 40 || { echo "REGRESSION: skill count dropped below 40"; exit 1; }
          test ${CMDS} -ge 38 || { echo "REGRESSION: command count dropped below 38"; exit 1; }
          test ${AGENTS} -ge 6 || { echo "REGRESSION: agent count dropped below 6"; exit 1; }
          echo "Regression gate passed"

  release:
    name: Auto-release (SemVer from commits)
    runs-on: bun
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout (full history)
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .
          git fetch --tags

      - name: Configure git
        shell: sh
        run: |
          git config user.name "ATLAS CI"
          git config user.email "atlas-ci@axoiq.com"

      - name: Auto-release
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_API_URL: http://${{ vars.FORGEJO_HOST }}/api/v1
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          chmod +x .forgejo/scripts/auto-release.sh
          .forgejo/scripts/auto-release.sh

  publish:
    name: Publish to Forgejo Package Registry
    runs-on: bun
    needs: [build, test]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        shell: sh
        env:
          GIT_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_HOST: ${{ vars.FORGEJO_HOST }}
        run: |
          git clone --depth=1 http://oauth2:${GIT_TOKEN}@${FORGEJO_HOST}/${{ github.repository }}.git .

      - name: Install yq
        shell: sh
        run: |
          wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/v4.44.6/yq_linux_amd64"
          chmod +x /usr/local/bin/yq

      - name: Build all tiers
        shell: sh
        run: ./build.sh all

      - name: Package and publish tiers
        shell: sh
        env:
          FORGEJO_TOKEN: ${{ secrets.ATLAS_FORGEJO_TOKEN }}
          FORGEJO_URL: ${{ github.server_url }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -eu
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "Publishing version ${VERSION}"

          for tier in admin dev user; do
            pkg="atlas-${tier}"
            tarball="${pkg}-${VERSION}.tar.gz"

            echo "Packaging ${pkg} v${VERSION}..."
            tar -czf "${tarball}" -C dist "${pkg}"

            echo "Publishing ${tarball}..."
            curl --fail-with-body \
              --silent --show-error \
              -X PUT \
              -H "Authorization: token ${FORGEJO_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${tarball}" \
              "${FORGEJO_URL}/api/packages/${OWNER}/generic/${pkg}/${VERSION}/${tarball}"

            echo "  Published: ${FORGEJO_URL}/${OWNER}/-/packages/generic/${pkg}/${VERSION}"
          done

          echo "All 3 tiers published for v${VERSION}"
