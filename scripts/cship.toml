# CShip + ATLAS Plugin — Layout v6 (CC 2.1.107 alignment, v5.7.0)
# Phase 1 of sleepy-tumbling-hennessy.md big-bang plan.
#
# Row 1: 🏛️ version 👑tier  🟣 model (ctx)  📁 dir  🌿 git  🌳 worktree  📋 session  🤖 agents
# Row 2: context_bar  📊 effort  💰 cost_usd  📈 lines  ⏱ rate_limits  ⚠️ 200K+ (cond)
# Row 3: alert (conditional: context >75%)
#
# Refresh: every 10s for live rate_limits + cost updates.
# Status line JSON input (CC v2.1.107):
#   model.id / context_window.{size,used_percentage} / cost.total_cost_usd /
#   effort / rate_limits / workspace.{git_worktree,added_dirs} / exceeds_200k_tokens

[cship]
lines = [
  "🏛️ ATLAS $custom.atlas_version 👑$custom.atlas_tier  $cship.model ($custom.atlas_context_size)  $directory  $git_branch $git_status  $cship.worktree  $cship.session  $custom.atlas_agents",
  "$cship.context_bar  $custom.atlas_effort  $custom.atlas_cost_usd  📈 $cship.cost.total_lines_added $cship.cost.total_lines_removed  $cship.usage_limits  $custom.atlas_200k_badge",
  "$custom.atlas_alert"
]
refresh_interval = 10

[cship.model]
symbol = "🟣 "
style = "bold"

[cship.context_bar]
width = 20
style = "green"
warn_threshold = 50
warn_style = "yellow"
critical_threshold = 75
critical_style = "bold red"

[cship.cost.total_lines_added]
symbol = "+"
style = "green"

[cship.cost.total_lines_removed]
symbol = "-"
style = "red"

[cship.worktree]
symbol = "🌳 "
style = "bold green"

[cship.session]
symbol = "📋 "
style = "bold blue"

[cship.usage_limits]
style = "dim"

# ─── Custom Modules (resolved via shell scripts) ─────────────

[custom.atlas_context_size]
command = "~/.local/share/atlas-statusline/atlas-context-size-module.sh"
style = "bold cyan"

[custom.atlas_version]
command = "~/.local/share/atlas-statusline/atlas-resolve-version.sh"
style = "bold cyan"

[custom.atlas_tier]
command = "jq -r '.tier // \"?\"' ${CLAUDE_PLUGIN_DATA:-$HOME/.claude}/session-state.json 2>/dev/null || echo '?'"
style = "bold yellow"

[custom.atlas_agents]
command = "~/.local/share/atlas-statusline/atlas-agents-module.sh"
style = "bold yellow"

[custom.atlas_effort]
# v5.7.0 — Effort level badge (CC v2.1.84+)
command = "~/.local/share/atlas-statusline/atlas-effort-module.sh"
style = "bold magenta"

[custom.atlas_cost_usd]
# v5.7.0 — Session cost USD (CC v2.1.x cost.total_cost_usd)
command = "~/.local/share/atlas-statusline/atlas-cost-usd-module.sh"
style = "dim green"

[custom.atlas_200k_badge]
# v5.7.0 — Warning when exceeds_200k_tokens=true (CC v2.1.87+)
command = "~/.local/share/atlas-statusline/atlas-200k-badge-module.sh"
style = "bold yellow"

[custom.atlas_alert]
command = "~/.local/share/atlas-statusline/atlas-alert-module.sh"
style = "bold red"
