# Iron Laws are NON-NEGOTIABLE execution invariants enforced by <HARD-GATE> blocks
# in skill bodies. Each law has:
#   - a verbatim "statement" injected into the skill body
#   - a sha256 signature computed on the statement (byte-exact match required at lint time)
#   - applicable_skills[] that must reference the law via superpowers_pattern: [iron_law]
