    P2: 9     # nice-to-have for v6.1.0

  category_counts:
    programming: 5
    product: 5
    uxui: 5
    collab: 3
    architecture: 4
    planning: 5
    infrastructure: 5
    research: 4
    documentation: 4
    analytics: 3
    meta: 3

  hitl_required: 2  # workflow-brainstorm-collab, workflow-facilitate-decision
  iron_law_coverage: 17  # workflows referencing at least 1 Iron Law

  validation_rules:
    - "every name starts with 'workflow-'"
    - "every category in the 11-enum above"
    - "every iron_law ref resolves to iron-laws.yaml"
    - "every chain entry is a registered skill OR another workflow-*"
    - "phase field matches parent plan phase assignment"
